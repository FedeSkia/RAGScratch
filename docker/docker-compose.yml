services:

  rag-app:
    image: rag-app:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        APP_ENV: docker/.env.local.docker
    ports:
      - "8000:8000"
    networks:
      - my_app_network
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: postgres
    image: pgvector/pgvector:0.8.0-pg17-trixie
    restart: always
    environment:
      POSTGRES_PASSWORD: rag_app
      POSTGRES_USER: rag_app
      POSTGRES_DB: conversations_db
    ports:
      - "5433:5432"
    networks:
      - my_app_network
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "rag_app" ]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  my_app_network:
    driver: bridge

volumes:
  app-data:
    driver: local